<app-nav></app-nav>

<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 100px);">
  <div class="row justify-content-center w-100">
    <div class="col-md-8 col-lg-6">
      
      @if (user(); as user) {
        <div class="card shadow-lg border-0">
          <div class="card-header bg-dark text-white p-4">
            <div class="d-flex align-items-center">
              <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                <span class="fs-3 fw-bold text-uppercase">{{ user.name.charAt(0) }}</span>
              </div>
              <div class="ms-3">
                <h3 class="mb-0">{{ user.name }}</h3>
              </div>
            </div>
          </div>

          <div class="card-body p-4">
            <div class="mb-4">
              <label class="text-muted small text-uppercase fw-bold">E-mail de Cadastro</label>
              <p class="fs-5 mb-0">{{ user.email }}</p>
            </div>

            <hr class="text-muted opacity-25">

            <app-balance [loggedUser]="user"></app-balance>
          </div>
        </div>
      } @else {
        <div class="text-center">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
          </div>
          <p class="mt-3 text-muted">Sincronizando dados da sua conta...</p>
        </div>
      }

    </div>
  </div>
</div>
